<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Contact form</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  
  <form action="">
    <h1>Contact Us</h1>
    <div class="name-label">
      <label for="first-name">First Name</label>
    <label for="last-name">last Name</label>
    </div>
    
    <div class="name-input">
      <input type="text" name="first-name" id="first-name" required>
      <input type="text" name="last-name" id="last-name" required
      >
    </div>

    <label for="email">Email Address</label>
    <div class="email-input">
      <input required type="email" name="email" id="email">
    </div>

    <label for="query">Query Type</label>
    <div class="query-options">
      <input class="radio" type="radio" name="query" id="general-enquiry" placeholder="General Enquiry">
      <input class="radio" type="radio" name="quer" id="support-request" placeholder="Support Request">
    </div>

    <label for="message">Message</label>
    <textarea name="message" id="message"></textarea>

    <label for=""><input type="checkbox" name="" id="">I consent to being contacted by the team</label>
    <button type="submit">Submit</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
